name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Zip dosyasını çıkar
        run: |
          unzip PhotoToPDF_v2.zip || true

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle izni ver
        run: chmod +x PhotoToPDF/gradlew

      - name: APK derle
        run: |
          cd PhotoToPDF
          ./gradlew assembleDebug

      - name: APK'yı kaydet
        uses: actions/upload-artifact@v4
        with:
          name: PhotoToPDF-APK
          path: PhotoToPDF/app/build/ou
