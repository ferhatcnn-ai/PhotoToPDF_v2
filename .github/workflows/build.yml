name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Zip dosyasını çıkar
        run: unzip PhotoToPDF_v2.zip || true

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Wrapper oluştur
        run: |
          cd PhotoToPDF
          gradle wrapper --gradle-version 8.0
        env:
          GRADLE_VERSION: 8.0

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v3

      - name: APK derle
        run: |
          cd PhotoToPDF
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK'yı kaydet
        uses: actions/upload-artifact@v4
        with:
          name: PhotoToPDF-APK
          path: PhotoToPDF/app/build/o
