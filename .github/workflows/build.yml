name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Zip dosyasını çıkar
        run: unzip PhotoToPDF_v2.zip || true

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: APK derle
        run: |
          cd PhotoToPDF_v2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK'yı kaydet
        uses: actions/upload-artifact@v4
        with:
          name: PhotoToPDF-APK
          path: PhotoToPDF_v2/app/build/outputs/apk/debug/
